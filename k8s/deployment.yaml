apiVersion: apps/v1
kind: Deployment
metadata:
  name: card-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: card-service
  template:
    metadata:
      labels:
        app: card-service
    spec:
      containers:
        - name: card-service
          image: awafallty/card-service:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: card-service-config